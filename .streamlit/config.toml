[browser]
gatherUsageStats = false
serverName = "sipcheck.streamlit.app"

[server]
enableCORS = false
enableXsrfProtection = true

[client]
showErrorDetails = false
toolbarMode = "minimal"
showSidebarNavigation = false

[theme]
base = "light"
backgroundColor = "#F0F4FF"
secondaryBackgroundColor = "#E8EDFB"
textColor = "#1E1B4B"
primaryColor = "#4F46E5"
font = "sans serif"
