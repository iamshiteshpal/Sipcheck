[browser]
gatherUsageStats = false
serverName = "sipcheck.streamlit.app"

[server]
enableCORS = false
enableXsrfProtection = true

[client]
showErrorDetails = false
toolbarMode = "minimal"
showSidebarNavigation = false

[theme]
base = "dark"
primaryColor = "#818CF8"
backgroundColor = "#0F0F1A"
secondaryBackgroundColor = "#1E1E2E"
textColor = "#F1F5F9"
font = "sans serif"
