[browser]
gatherUsageStats = false
serverName = "sipcheck.streamlit.app"

[server]
enableCORS = false
enableXsrfProtection = true

[client]
showErrorDetails = false
toolbarMode = "minimal"
showSidebarNavigation = false

[theme]
base = "dark"
backgroundColor = "#07090f"
secondaryBackgroundColor = "#0c0f1a"
textColor = "#e2e8f0"
primaryColor = "#63b3ed"
font = "sans serif"
